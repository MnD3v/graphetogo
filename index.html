<head>

  <!-- Primary Meta Tags -->
  <meta name="title" content="GRAPHE TOGO" />

  <!-- Open Graph / Facebook -->

  <!-- Twitter -->
  <meta property="twitter:card" content="summary_large_image" />

    content="Groupe Chrétien de Recherche – Actions pour la Promotion Humaine au Togo." />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Manrope:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet">
  <style>
    #initial-loader {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: white;
      z-index: 10000;
      transition: opacity 0.5s ease;
    }

    .rings-container {
      position: relative;
      width: 96px;
      height: 96px;
    }

    .ring {
      position: absolute;
      inset: 0;
      border: 4px solid transparent;
      border-radius: 50%;
    }

    .ring-bg {
      border-color: #f3f3f3;
    }

    .ring-outer {
      border-top-color: #5DA603;
      animation: spin 1s linear infinite;
    }

    .ring-inner {
      inset: 8px;
      border-bottom-color: #01391C;
      animation: spin-reverse 1.5s linear infinite;
    }

    @keyframes spin {
      0% {
        transform: rotate(0deg);
      }

      100% {
        transform: rotate(360deg);
      }
    }

    @keyframes spin-reverse {
      0% {
        transform: rotate(0deg);
      }

      100% {
        transform: rotate(-360deg);
      }
    }
  </style>
</head>

<body>
  <div id="root">
    <div id="initial-loader">
      <div class="rings-container">
        <div class="ring ring-bg"></div>
        <div class="ring ring-outer"></div>
        <div class="ring ring-inner"></div>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
